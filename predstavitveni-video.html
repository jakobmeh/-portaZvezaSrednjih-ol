<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Predstavitveni video SZSS</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: #05070c; color: #f1f5f9;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      display: grid; place-items: center; padding: 24px;
    }
    main { width: min(100%, 1320px); display: grid; gap: 14px; }
    canvas {
      width: 100%; aspect-ratio: 16/9;
      border: 1px solid #1e293b; border-radius: 10px;
      background: #08090f; box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 14px 16px;
      border: 1px solid #1e293b; border-radius: 10px; background: #0e1118;
    }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    button, a.download {
      border: 0; border-radius: 8px; padding: 10px 16px;
      background: #2baf3a; color: white; font-weight: 800;
      cursor: pointer; text-decoration: none; font-size: 14px;
    }
    button.secondary { background: #1e293b; color: #94a3b8; border: 1px solid #293241; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    p.status { margin: 0; color: #475569; font-size: 14px; }
  </style>
</head>
<body>
<main>
  <canvas id="video" width="1280" height="720"></canvas>
  <div class="bar">
    <p class="status" id="status">Predogled teče. Klikni "Ustvari video" za izvoz.</p>
    <div class="actions">
      <button id="record">⏺ Ustvari video (.webm)</button>
      <button class="secondary" id="restart">↺ Ponovi</button>
      <a class="download" id="download" hidden>⬇ Prenesi video</a>
    </div>
  </div>
</main>
<script>
const canvas = document.getElementById("video");
const ctx = canvas.getContext("2d");
const W = 1280, H = 720;
const FPS = 30;
const DURATION = 72;

// ── Helpers ───────────────────────────────────────────────────────────────────
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const ease  = v => 1 - Math.pow(1 - clamp(v,0,1), 3);
const easeIn= v => Math.pow(clamp(v,0,1), 2);
const lerp  = (a,b,t) => a + (b-a)*t;
const easeIO= v => { v=clamp(v,0,1); return v<.5 ? 2*v*v : 1-Math.pow(-2*v+2,2)/2; };

function rr(x,y,w,h,r,fill,stroke,lw=1) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function t(val,x,y,sz,color="#f1f5f9",weight=700,align="left",baseline="top") {
  ctx.font=`${weight} ${sz}px Inter, Segoe UI, sans-serif`;
  ctx.fillStyle=color; ctx.textAlign=align; ctx.textBaseline=baseline;
  ctx.fillText(val,x,y);
}

function badge(label,x,y,bg,color,padX=10) {
  const w=ctx.measureText(label).width+padX*2;
  rr(x,y,w,22,11,bg,null);
  t(label,x+padX,y+5.5,10,color,800,"left","top");
  return w;
}

function pill(label,x,y,bg,color) {
  ctx.font="800 10px Inter, Segoe UI, sans-serif";
  const w=ctx.measureText(label).width+20;
  rr(x,y,w,20,10,bg,null);
  t(label,x+10,y+5,10,color,800);
  return w;
}

function input(labelTxt,val,x,y,w) {
  t(labelTxt.toUpperCase(),x,y-18,9,"#475569",900);
  rr(x,y,w,46,10,"#131720","rgba(255,255,255,0.1)");
  t(val,x+14,y+15,13,"#f1f5f9",500);
}

// ── Background ────────────────────────────────────────────────────────────────
function bg() {
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,"#08090f"); g.addColorStop(1,"#0c1018");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ── App Shell Nav ─────────────────────────────────────────────────────────────
function nav(active="dashboard") {
  rr(40,20,1200,56,12,"rgba(6,8,15,0.96)","rgba(255,255,255,0.08)");
  // Logo text
  ctx.font="900 15px Inter,sans-serif"; ctx.fillStyle="#6ee77a";
  ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillText("ŠZSŠ",64,48);
  // Nav items
  const items=[["Nadzorna plošča","/dashboard"],["Turnirji","/tournaments"],
    ["Lestvice","/leaderboard"],["Ekipe","/teams"],["Moja šola","/school"]];
  items.forEach(([label,href],i)=>{
    const isActive=href.includes(active);
    const x=145+i*148, col=isActive?"#6ee77a":"#475569";
    if(isActive) rr(x-10,35,ctx.measureText(label).width+20,26,8,"rgba(43,175,58,0.12)",null);
    t(label,x,40,12,col,isActive?700:500);
  });
  // Pro badge
  pill("⭐ Pro",1040,37,"rgba(245,158,11,0.15)","#fbbf24");
  // User
  rr(1096,34,130,28,14,"rgba(255,255,255,0.05)","rgba(255,255,255,0.08)");
  rr(1104,38,20,20,10,"linear-gradient(135deg,#2baf3a,#0a2c57)".includes("#")?"#2baf3a":"#2baf3a",null);
  // gradient avatar
  const av=ctx.createLinearGradient(1104,38,1124,58);
  av.addColorStop(0,"#2baf3a"); av.addColorStop(1,"#0a2c57");
  ctx.fillStyle=av; ctx.beginPath(); ctx.arc(1114,48,10,0,Math.PI*2); ctx.fill();
  t("JM",1114,48,8,"white",900,"center","middle");
  t("Jakob",1130,41,11,"#94a3b8",500);
}

function pageHeader(title,sub) {
  t(title,64,96,30,"#f1f5f9",900);
  if(sub) t(sub,66,133,13,"#94a3b8",500);
}

// ── Progress bar ──────────────────────────────────────────────────────────────
function progress(pct) {
  rr(40,710,1200,5,3,"#1e293b",null);
  rr(40,710,1200*clamp(pct,0,1),5,3,"#2baf3a",null);
}

// ══════════════════════════════════════════════════════════════════════════════
// SCENE 1 · HERO / LANDING  (0–9s)
// ══════════════════════════════════════════════════════════════════════════════
function sceneHero(l) {
  const a1=ease(l/1.2), a2=ease((l-0.5)/1.2), a3=ease((l-1.2)/1.2);

  // Glow
  ctx.save(); ctx.globalAlpha=0.06;
  const g=ctx.createRadialGradient(640,260,0,640,260,400);
  g.addColorStop(0,"#2baf3a"); g.addColorStop(1,"transparent");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();

  // Nav (landing style)
  ctx.save(); ctx.globalAlpha=a1;
  rr(0,0,W,64,0,"rgba(6,8,15,0.88)","rgba(255,255,255,0.06)");
  t("ŠZSŠ",56,24,18,"#6ee77a",900);
  t("Lestvice",560,24,13,"#94a3b8",600);
  t("Turnirji",670,24,13,"#94a3b8",600);
  rr(760,18,80,28,12,"rgba(255,255,255,0.06)","rgba(255,255,255,0.08)");
  t("Prijava",780,24,12,"#94a3b8",600);
  rr(860,16,130,32,12,"#2baf3a",null);
  t("Registracija",876,22,12,"white",700);
  ctx.restore();

  // Hero text
  ctx.save(); ctx.globalAlpha=a1;
  badge("🏆  Uradna platforma ŠZSŠ",560,108,"rgba(43,175,58,0.12)","#6ee77a",14);
  ctx.restore();

  ctx.save(); ctx.globalAlpha=a2;
  t("Tekmuj.",200,148,72,"#f1f5f9",900);
  // gradient "Zmaguji."
  const gtext=ctx.createLinearGradient(460,148,760,220);
  gtext.addColorStop(0,"#2baf3a"); gtext.addColorStop(1,"#6ee77a");
  ctx.font="900 72px Inter,sans-serif"; ctx.fillStyle=gtext; ctx.textBaseline="top";
  ctx.fillText("Zmaguji.",452,148);
  t("Pusti sled.",200,232,72,"#f1f5f9",900);
  t("Platforma za organizacijo šolskih turnirjev v Sloveniji.",200,322,17,"#94a3b8",500);
  ctx.restore();

  // CTA buttons
  ctx.save(); ctx.globalAlpha=a3;
  rr(200,370,200,48,12,"#2baf3a",null);
  t("Začni brezplačno →",220,387,14,"white",700);
  rr(416,370,160,48,12,"rgba(255,255,255,0.06)","rgba(255,255,255,0.1)");
  t("Poglej turnirje",435,387,14,"#94a3b8",600);
  t("Brezplačna registracija · Ni kreditne kartice",200,432,12,"#475569",500);
  ctx.restore();

  // Pricing cards (right side)
  ctx.save(); ctx.globalAlpha=ease((l-1.8)/1.5);

  // Pro card
  rr(730,120,220,280,16,"rgba(43,175,58,0.08)","rgba(43,175,58,0.3)");
  t("Pro",752,144,13,"#94a3b8",700);
  t("5€",752,168,42,"#6ee77a",900);
  t("/mesec",810,182,13,"#475569",500);
  const proFeats=["Ustvarjanje turnirjev","QR registracija","Upravljanje tekem","Obvestila sledilcem"];
  proFeats.forEach((f,i)=>{
    t("✓",752,228+i*30,11,"#2baf3a",900);
    t(f,770,228+i*30,11,"#94a3b8",500);
  });
  rr(750,368,180,36,10,"#2baf3a",null);
  t("Kupi Pro",815,380,13,"white",700,"center","top");

  // School license card
  rr(970,120,240,280,16,"rgba(245,158,11,0.06)","rgba(245,158,11,0.25)");
  t("🏫  Šolska licenca",988,144,12,"#fbbf24",700);
  t("500€",988,168,42,"#fbbf24",900);
  t("/leto",1068,182,13,"#475569",500);
  t("neomejeno dijakov",988,214,11,"#475569",500);
  const schFeats=["Pro za celotno šolo","Neomejeno dijakov","Centralno upravljanje","Brez mesečnih plačil"];
  schFeats.forEach((f,i)=>{
    t("✓",988,244+i*28,11,"#f59e0b",900);
    t(f,1004,244+i*28,11,"#94a3b8",500);
  });
  rr(988,368,200,36,10,"rgba(245,158,11,0.15)","rgba(245,158,11,0.3)");
  t("Kontaktiraj nas",1063,380,12,"#fbbf24",700,"center","top");
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════════════════
// SCENE 2 · LOGIN  (9–15s)
// ══════════════════════════════════════════════════════════════════════════════
function sceneLogin(l) {
  const a=ease(l/1);
  ctx.save(); ctx.globalAlpha=a;
  rr(390,80,500,480,20,"#0e1118","rgba(255,255,255,0.08)");
  t("Prijava",540,116,26,"#f1f5f9",900);
  t("Dobrodošel nazaj.",502,152,14,"#94a3b8",500);
  input("Email","jakobmehmc1@gmail.com",430,200,420);
  input("Geslo","••••••••",430,272,420);
  rr(430,342,420,48,12,"#2baf3a",null);
  t("Prijavi se",630,358,15,"white",700,"center","top");
  rr(430,408,420,48,12,"rgba(255,255,255,0.04)","rgba(255,255,255,0.07)");
  t("Ustvari račun",630,424,14,"#94a3b8",500,"center","top");
  ctx.restore();

  // Simulate typing cursor after delay
  if(l>1.5) {
    ctx.save(); ctx.globalAlpha=ease((l-1.5)/0.5)*(Math.floor(l*2)%2===0?1:0.3);
    rr(430+14+ctx.measureText("jakobmehmc1@gmail.com").width+2,216,2,18,1,"#2baf3a",null);
    ctx.restore();
  }

  // Success flash
  if(l>4) {
    ctx.save(); ctx.globalAlpha=ease((l-4)/0.5)*ease((5.5-l)/0.5);
    rr(390,558,500,48,12,"rgba(43,175,58,0.15)","rgba(43,175,58,0.4)");
    t("✓  Prijava uspešna — preusmerjam...",524,574,13,"#6ee77a",700,"center","top");
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SCENE 3 · DASHBOARD  (15–24s)
// ══════════════════════════════════════════════════════════════════════════════
function sceneDashboard(l) {
  nav("dashboard");
  ctx.save(); ctx.globalAlpha=ease(l/0.8);

  // Welcome banner
  if(l<5) {
    rr(64,88,1152,56,14,"rgba(43,175,58,0.1)","rgba(43,175,58,0.25)");
    t("🎉",80,107,20,"white",400);
    t("Dobrodošel, Jakob!",112,96,15,"#f1f5f9",900);
    t("Račun je ustvarjen. Pridruži se turnirju ali ustvari ekipo.",112,114,12,"#94a3b8",500);
    pill("⭐ Pro aktiven",1096,98,"rgba(245,158,11,0.15)","#fbbf24");
  } else {
    pageHeader("Zdravo, Jakob","Pregled tekmovanj in aktivnosti");
  }

  // Stat cards
  const stats=[["Turnirji skupaj","2","v sistemu"],["Moje prijave","3","ekip"],
    ["Moje ekipe","4","aktivnih"],["Neprebrana","1","obvestila"]];
  stats.forEach(([label,val,sub],i)=>{
    const x=64+i*295, y=160;
    rr(x,y,278,114,14,"#0e1118","rgba(255,255,255,0.07)");
    t(label,x+18,y+16,11,"#475569",500);
    t(val,x+18,y+42,44,"#f1f5f9",900);
    t(sub,x+18,y+92,11,"#475569",500);
  });

  // Upcoming tournaments
  rr(64,294,756,300,14,"#0e1118","rgba(255,255,255,0.07)");
  t("PRIHAJAJOČI TURNIRJI",82,314,10,"#475569",900);
  t("Vsi turnirji →",738,314,11,"#2baf3a",700,"right","top");
  const tourn=[
    ["Futsal pokal ŠZSŠ","Futsal · Velenje · 20.05.2026","3/8","Odprt","#6ee77a","rgba(43,175,58,0.1)"],
    ["Košarka 3x3","Košarka · Ljubljana · 28.05.2026","1/4","Odprt","#6ee77a","rgba(43,175,58,0.1)"],
  ];
  tourn.forEach(([title,meta,reg,status,sc,sbg],i)=>{
    const y=342+i*60;
    if(i>0) { ctx.strokeStyle="rgba(255,255,255,0.06)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(82,y-2); ctx.lineTo(802,y-2); ctx.stroke(); }
    t(title,82,y+4,13,"#f1f5f9",600);
    t(meta,82,y+22,11,"#475569",500);
    t(reg,740,y+10,12,"#475569",500,"right");
    pill(status,756,y+8,sbg,sc);
  });

  // Teams sidebar
  rr(840,294,376,300,14,"#0e1118","rgba(255,255,255,0.07)");
  t("MOJE EKIPE",858,314,10,"#475569",900);
  t("Upravljaj →",1178,314,11,"#2baf3a",700,"right","top");
  const teams=[["Šarci FC","Futsal · 6 članov","⚽"],["Rdeče Zvezde","Futsal · 6 članov","⚽"],["Zmaji","Košarka · 5 članov","🏀"]];
  teams.forEach(([name,meta,emoji],i)=>{
    const y=346+i*60;
    if(i>0){ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(858,y-2);ctx.lineTo(1188,y-2);ctx.stroke();}
    rr(858,y+2,32,32,10,"rgba(43,175,58,0.08)",null);
    t(emoji,874,y+10,14,"white",400,"center","top");
    t(name,900,y+4,13,"#f1f5f9",600);
    t(meta,900,y+22,11,"#475569",500);
  });

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════════════════
// SCENE 4 · EKIPE – ročni vnos članov  (24–36s)
// ══════════════════════════════════════════════════════════════════════════════
function sceneEkipe(l) {
  nav("teams");
  pageHeader("Ekipe","Ustvari ekipe in dodaj sošolce.");

  ctx.save(); ctx.globalAlpha=ease(l/0.8);

  // Team card
  rr(64,160,1152,490,16,"#131720","rgba(255,255,255,0.07)");

  // Header
  t("Šarci FC",82,180,22,"#f1f5f9",900);
  badge("Futsal",190,183,"rgba(43,175,58,0.12)","#8ef29a");
  t("Gimnazija Velenje · ustvaril Jakob M.",82,208,11,"#475569",500);
  pill("2 prijavi",1108,183,"rgba(255,255,255,0.06)","#94a3b8");

  // Left: Add member forms
  // --- Registered schoolmate ---
  rr(82,236,340,186,12,"#0e1118","rgba(255,255,255,0.07)");
  t("✓",98,256,12,"#6ee77a",900);
  t("DODAJ SOŠOLCA Z RAČUNOM",114,256,9,"#475569",900);
  rr(98,280,308,40,8,"#131720","rgba(255,255,255,0.09)");
  t("Izberi sošolca...",112,296,12,"#475569",500);
  rr(98,330,308,36,8,"#131720","rgba(255,255,255,0.06)");
  t("Pozicija (neobvezno)",112,344,12,"#475569",400);
  rr(98,378,308,36,10,"#2baf3a",null);
  t("Dodaj",236,390,12,"white",700,"center","top");

  // --- Manual add ---
  const mA=ease((l-0.3)/0.8);
  rr(82,434,340,196,12,"#0e1118","rgba(255,255,255,0.07)");
  ctx.save(); ctx.globalAlpha=mA;
  t("+",98,454,12,"#475569",900);
  t("DODAJ ROČNO (BREZ RAČUNA)",114,454,9,"#475569",900);
  // Name field — animate typing
  rr(98,476,308,40,8,"#131720","rgba(255,255,255,0.09)");
  const typed=l>2.5?"Luka Novak":l>1.5?"Luka Nov":l>1?"Luka":l>0.5?"Lu":"";
  t(typed||"Ime in priimek *",112,492,12,typed?"#f1f5f9":"#475569",typed?500:400);
  if(l>0.5&&l<5){rr(112+ctx.measureText(typed).width+2,488,2,16,1,"#2baf3a",null);}
  rr(98,526,148,36,8,"#131720","rgba(255,255,255,0.07)");
  t(l>3?"3.B":"Razred",112,540,12,l>3?"#f1f5f9":"#475569",l>3?500:400);
  rr(254,526,152,36,8,"#131720","rgba(255,255,255,0.07)");
  t("Pozicija",268,540,12,"#475569",400);
  rr(98,572,308,36,10,"rgba(255,255,255,0.06)","rgba(255,255,255,0.1)");
  t("Dodaj ročno",236,584,12,"#94a3b8",700,"center","top");
  ctx.restore();

  // Right: Members list
  rr(454,236,740,394,12,"#0e1118","rgba(255,255,255,0.07)");
  t(`ČLANI · ${l>5?7:6}`,472,254,10,"#475569",900);

  const players=[
    {name:"Jakob M.",sub:"Kapetan",hasAccount:true,you:true},
    {name:"Luka Novak",sub:"Napadalec",hasAccount:true},
    {name:"Matej Horvat",sub:"Branilec",hasAccount:true},
    {name:"Rok Kovač",sub:"Vratar",hasAccount:false},
    {name:"Anže Potočnik",sub:"Ročno dodan · 2.A",hasAccount:false},
    {name:"Miha Zupan",sub:"Srednji vezni",hasAccount:true},
  ];

  // New player appearing
  const showNew=l>4.8;
  const allPlayers=showNew ? [...players,{name:"Luka Novak",sub:"Ročno dodan · 3.B",hasAccount:false,new:true}] : players;

  allPlayers.forEach((p,i)=>{
    const y=282+i*54;
    if(i>0){ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(472,y-2);ctx.lineTo(1166,y-2);ctx.stroke();}

    const newA=p.new?ease((l-4.8)/0.4):1;
    ctx.save(); ctx.globalAlpha*=newA;

    // Avatar
    const avBg=p.hasAccount?"rgba(43,175,58,0.2)":"rgba(255,255,255,0.06)";
    const avCol=p.hasAccount?"#6ee77a":"#94a3b8";
    rr(472,y+4,28,28,14,avBg,null);
    const init=p.name.split(" ").map(n=>n[0]).slice(0,2).join("").toUpperCase();
    t(init,486,y+10,9,avCol,900,"center","top");

    t(p.name+(p.you?" ":""),510,y+6,13,"#f1f5f9",600);
    if(p.you){t("ti",510+ctx.measureText(p.name+" ").width,y+6,10,"#6ee77a",900);}
    t(p.sub,510,y+22,11,"#475569",500);

    // "ročno" tag for manual
    if(!p.hasAccount){
      const tw=ctx.measureText("ročno").width+14;
      rr(1098-tw,y+8,tw,20,6,"rgba(255,255,255,0.05)",null);
      t("ročno",1098-tw+7,y+12,9,"#475569",700);
    }

    ctx.restore();
  });

  if(showNew){
    ctx.save();ctx.globalAlpha=ease((l-4.8)/0.4)*0.7;
    rr(454,236+allPlayers.length*54-2,740,8,0,"rgba(43,175,58,0.15)",null);
    ctx.restore();
  }

  ctx.restore();
}

// SCENE 5 · USTVARI TURNIR  (36–46s)

function drawMini(x,y,p) {
  const q=ease(p);
  const mW=120, mH=56, gapV=30, col2x=x+160;
  // Round 1
  [[x,y,"Šarci FC","BC Rdeče"],[x,y+mH+gapV,"Vulkani U.","4. ekipa"]].forEach(([mx,my,h,a])=>{
    rr(mx,my,mW,mH,6,"#151a24","#344054");
    t(h,mx+10,my+12,10,"#d7dee9",600);
    ctx.strokeStyle="#1e293b";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mx+6,my+mH/2);ctx.lineTo(mx+mW-6,my+mH/2);ctx.stroke();
    t(a,mx+10,my+mH/2+8,10,"#94a3b8",500);
  });
  // Connectors
  if(q>0.3){
    ctx.strokeStyle="rgba(43,175,58,0.5)";ctx.lineWidth=2;ctx.beginPath();
    const midY=y+mH+gapV/2;
    ctx.moveTo(x+mW,y+mH/2); ctx.lineTo(x+mW+20*q,y+mH/2);
    ctx.lineTo(x+mW+20*q,midY); ctx.lineTo(x+mW+40*q,midY);
    ctx.moveTo(x+mW,y+mH+gapV+mH/2); ctx.lineTo(x+mW+20*q,y+mH+gapV+mH/2);
    ctx.lineTo(x+mW+20*q,midY); ctx.stroke();
  }
  // Final
  if(q>0.6){
    ctx.save();ctx.globalAlpha=(q-0.6)/0.4;
    rr(col2x,y+mH/2+gapV/2-mH/4,mW,mH,6,"#151a24","rgba(43,175,58,0.4)");
    t("FINALE",col2x+10,y+mH/2+gapV/2-mH/4+8,9,"#6ee77a",900);
    t("BC Naklo",col2x+10,y+mH/2+gapV/2-mH/4+22,10,"#d7dee9",600);
    ctx.restore();
  }
}

  { from: 46, to: 60, fn: sceneBracket,   label: "Bracket & live tekme" },
  { from: 60, to: 67, fn: sceneLestvica,  label: "Lestvica" },
  { from: 67, to: 73, fn: sceneAdmin,     label: "Admin panel" },
  { from: 73, to: TOTAL, fn: sceneOutro,  label: "Outro" },
];

// ══════════════════════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════════════════════
let startTime = performance.now();

function draw(nowMs) {
  const t_ = (nowMs - startTime) / 1000;
  const looped = t_ % TOTAL;

  bg();

  const scene = scenes.find(s => looped >= s.from && looped < s.to) ?? scenes[0];
  const local = looped - scene.from;
  const sceneLen = scene.to - scene.from;
  const fadeIn  = ease(local / 0.6);
  const fadeOut = ease((sceneLen - local) / 0.5);
  const alpha   = Math.min(fadeIn, fadeOut);

  ctx.save(); ctx.globalAlpha = alpha;
  scene.fn(local);
  ctx.restore();

  progress(looped / TOTAL);

  // Scene label
  ctx.save();
  ctx.globalAlpha = 0.5;
  t(scene.label, 56, 700, 10, "#475569", 600);
  const timeLeft = Math.ceil(TOTAL - looped);
  t(`${Math.floor(looped)}s / ${TOTAL}s`, W-56, 700, 10, "#475569", 600, "right");
  ctx.restore();
}

function loop(now) {
  draw(now);
  requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById("restart").addEventListener("click", () => {
  startTime = performance.now();
});

let recording = false;
document.getElementById("record").addEventListener("click", async () => {
  if (recording) return;
  recording = true;
  document.getElementById("record").disabled = true;
  document.getElementById("download").hidden = true;
  document.getElementById("status").textContent = `Snemam ${TOTAL}s video...`;

  startTime = performance.now();
  const chunks = [];
  const stream = canvas.captureStream(FPS);
  const mime = ["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"]
    .find(m => MediaRecorder.isTypeSupported(m));
  const rec = new MediaRecorder(stream, mime ? { mimeType: mime, videoBitsPerSecond: 8_000_000 } : {});
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: rec.mimeType || "video/webm" });
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById("download");
    dl.href = url; dl.download = "szss-predstavitveni-video.webm";
    dl.hidden = false;
    document.getElementById("status").textContent = "✓ Video je pripravljen za prenos!";
    document.getElementById("record").disabled = false;
    recording = false;
  };
  rec.start();
  setTimeout(() => rec.stop(), TOTAL * 1000 + 300);
});

requestAnimationFrame(loop);
</script>
